name: 🏠 분양정보 유망도 리포트

on:
  schedule:
    # 매주 월요일 09:00 KST = UTC 00:00 Mon
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # GitHub UI에서 수동 실행 가능

env:
  PYTHON_VERSION: '3.14'
  WORKING_DIR: housing

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug LH API response
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          import requests

          key = os.environ.get("DATA_GO_KR_API_KEY", "")
          debug = {"key_set": bool(key), "key_len": len(key)}

          # LH 15058530 announce API
          url = "http://apis.data.go.kr/B552555/lhLeaseNoticeInfo1/lhLeaseNoticeInfo1"
          params = {
              "serviceKey": key,
              "pageNo": 1,
              "numOfRows": 5,
              "UPP_AIS_TP_CD": "05",
              "type": "json",
          }
          debug["url"] = url
          resp = requests.get(url, params=params, timeout=30)
          debug["status"] = resp.status_code
          debug["content_type"] = resp.headers.get("Content-Type", "")
          debug["raw_preview"] = resp.text[:500]

          try:
              data = resp.json()
          except Exception as e:
              debug["json_error"] = str(e)
              debug["raw_full"] = resp.text[:5000]
              with open("/tmp/lh_debug.json", "w") as f:
                  json.dump(debug, f, ensure_ascii=False, default=str)
              sys.exit(1)

          debug["response_type"] = type(data).__name__

          if isinstance(data, list):
              debug["list_len"] = len(data)
              if data and isinstance(data[0], dict):
                  debug["first_element_keys"] = list(data[0].keys())
                  if "dsSch" in data[0]:
                      items = data[0]["dsSch"]
                      debug["dsSch_count"] = len(items)
                      if items:
                          debug["first_item_keys"] = list(items[0].keys())
                          debug["first_item_sample"] = {k: str(v)[:100] for k, v in list(items[0].items())[:10]}
          elif isinstance(data, dict):
              debug["dict_keys"] = list(data.keys())
              if "dsSch" in data:
                  items = data["dsSch"]
                  debug["dsSch_count"] = len(items)
                  if items:
                      debug["first_item_keys"] = list(items[0].keys())
                      debug["first_item_sample"] = {k: str(v)[:100] for k, v in list(items[0].items())[:10]}
              elif "response" in data:
                  rd = data["response"]
                  debug["header"] = rd.get("header", {})
                  body = rd.get("body", {})
                  debug["body_keys"] = list(body.keys())
                  items = body.get("items", {})
                  if isinstance(items, dict):
                      item = items.get("item", [])
                      if isinstance(item, list) and item:
                          debug["item_count"] = len(item)
                          debug["first_item_keys"] = list(item[0].keys())
                          debug["first_item_sample"] = {k: str(v)[:100] for k, v in list(item[0].items())[:10]}
                      elif isinstance(item, dict):
                          debug["single_item_keys"] = list(item.keys())

          with open("/tmp/lh_debug.json", "w") as f:
              json.dump(debug, f, ensure_ascii=False, default=str)

          # Also print for log
          print(json.dumps(debug, ensure_ascii=False, indent=2, default=str))
          PYEOF
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: Generate housing report
        id: run_report
        run: |
          python main.py all 2>&1
          echo "report_path=output/report.html" >> $GITHUB_OUTPUT
          ls -la output/report.html
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: Read HTML body
        id: read_html
        run: |
          python3 << 'PYEOF'
          import os
          html_path = "output/report.html"
          with open(html_path, encoding="utf-8") as f:
              html = f.read()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"html_body<<GITHUB_EOF_MARKER\n{html}\nGITHUB_EOF_MARKER\n")
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '⚠️' }}
            분양정보 유망도 주간리포트
            (${{ steps.run_report.outputs.report_path != '' && 'OK' || 'FAILED' }})
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          html_body: ${{ steps.read_html.outputs.html_body }}

      - name: Upload debug data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lh-debug
          path: /tmp/lh_debug.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: housing-report
          path: ${{ env.WORKING_DIR }}/output/report.html
