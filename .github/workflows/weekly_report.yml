name: 🏠 분양정보 유망도 리포트

on:
  schedule:
    # 매주 월요일 09:00 KST = UTC 00:00 Mon
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # GitHub UI에서 수동 실행 가능

env:
  PYTHON_VERSION: '3.14'
  WORKING_DIR: housing

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug LH API response
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          import requests

          key = os.environ.get("DATA_GO_KR_API_KEY", "")
          results = {}

          url = "http://apis.data.go.kr/B552555/lhLeaseNoticeInfo1/lhLeaseNoticeInfo1"
          for code in ["05", "06", "13"]:
              params = {
                  "serviceKey": key,
                  "pageNo": 1,
                  "numOfRows": 10,
                  "UPP_AIS_TP_CD": code,
                  "type": "json",
              }
              resp = requests.get(url, params=params, timeout=30)
              data = resp.json()
              info = {"status": resp.status_code}

              if isinstance(data, list):
                  info["list_len"] = len(data)
                  for i, elem in enumerate(data):
                      if isinstance(elem, dict):
                          info[f"elem_{i}_keys"] = list(elem.keys())
                          if "dsList" in elem:
                              ds = elem["dsList"]
                              info[f"elem_{i}_dsList_len"] = len(ds)
                              if ds:
                                  info[f"elem_{i}_dsList_first_keys"] = list(ds[0].keys())
                                  info[f"elem_{i}_dsList_first_sample"] = {k: str(v)[:80] for k, v in list(ds[0].items())[:10]}
                          if "resHeader" in elem:
                              info[f"elem_{i}_header"] = elem["resHeader"]
              elif isinstance(data, dict):
                  info["dict_keys"] = list(data.keys())

              results[f"code_{code}"] = info

          print(json.dumps(results, ensure_ascii=False, indent=2, default=str))
          with open("/tmp/lh_debug.json", "w") as f:
              json.dump(results, f, ensure_ascii=False, default=str)
          PYEOF
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: Generate housing report
        id: run_report
        run: |
          python main.py all 2>&1
          echo "report_path=output/report.html" >> $GITHUB_OUTPUT
          ls -la output/report.html
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}

      - name: Read HTML body
        id: read_html
        run: |
          python3 << 'PYEOF'
          import os
          html_path = "output/report.html"
          with open(html_path, encoding="utf-8") as f:
              html = f.read()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"html_body<<GITHUB_EOF_MARKER\n{html}\nGITHUB_EOF_MARKER\n")
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '⚠️' }}
            분양정보 유망도 주간리포트
            (${{ steps.run_report.outputs.report_path != '' && 'OK' || 'FAILED' }})
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          html_body: ${{ steps.read_html.outputs.html_body }}

      - name: Upload debug data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lh-debug
          path: /tmp/lh_debug.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: housing-report
          path: ${{ env.WORKING_DIR }}/output/report.html
