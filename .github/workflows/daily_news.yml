name: 🌐 World News Digest

on:
  schedule:
    # 한국 시간(KST) 매일 07:00 = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub UI에서 수동 실행 버튼

env:
  PYTHON_VERSION: '3.12'
  WORKING_DIR: news

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news digest
        id: run_script
        run: |
          python main.py \
            --provider gemini \
            --limit 15 \
            --output markdown \
            > news_digest.md 2> run_log.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 대체 Provider를 쓰려면 주석 해제:
          # GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Read output
        id: read_output
        run: |
          {
            echo 'digest<<EOF'
            cat news_digest.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Read run log (stderr)
        id: read_log
        run: |
          {
            echo 'log<<EOF'
            cat run_log.txt
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '⚠️' }}
            World News Digest
            (${{ steps.run_script.outputs.exit_code == '0' && 'OK' || 'FAILED' }})
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          # Markdown 본문 → 대부분의 메일 클라이언트가 렌더링 가능
          body: |
            ${{ steps.read_output.outputs.digest }}

            ---

            **실행 로그:**
            ```
            ${{ steps.read_log.outputs.log }}
            ```

            **Actions 실행 URL:**
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload artifact (결과 파일 보관)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news-digest
          path: ${{ env.WORKING_DIR }}/news_digest.md
