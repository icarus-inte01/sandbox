name: 🌐 World News Digest

on:
  schedule:
    # 한국 시간(KST) 매일 아침 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub UI에서 수동 실행 버튼

env:
  PYTHON_VERSION: '3.12'
  WORKING_DIR: news

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check execution time
        run: |
          echo "✅ Workflow started"
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news digest
        id: run_script
        run: |
          set +e
          python main.py \
            --provider zen \
            --model big-pickle \
            --limit 15 \
            --output markdown \
            > news_digest.md 2> run_log.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          echo "=== stderr (run_log.txt) ==="
          cat run_log.txt
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Render HTML email
        id: render_html
        run: |
          python src/news/email_renderer.py \
            news_digest.md \
            news_digest.html \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Read HTML body
        id: read_html
        run: |
          python3 -c "import os; html = open('news_digest.html', encoding='utf-8').read(); open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8').write('html_body<<GITHUB_EOF_MARKER\n' + html + '\nGITHUB_EOF_MARKER\n')"

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: >-
            ${{ job.status == 'success' && '✅' || '⚠️' }}
            World News Digest
            (${{ steps.run_script.outputs.exit_code == '0' && 'OK' || 'FAILED' }})
          to: ${{ secrets.EMAIL_TO }}
          from: 박기영 <${{ secrets.MAIL_FROM }}>
          html_body: ${{ steps.read_html.outputs.html_body }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news-digest
          path: |
            ${{ env.WORKING_DIR }}/news_digest.md
            ${{ env.WORKING_DIR }}/news_digest.html
